<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Headbutt Berserker</title>

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://unpkg.com/aframe-environment-component/dist/aframe-environment-component.min.js"></script>
  <script src="https://unpkg.com/aframe-extras@7.6.0/dist/aframe-extras.min.js"></script>

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <button id="pauseMenuDesktopToggle" class="pause-icon-button" type="button" aria-label="Abrir menu de pausa">II</button>

  <div id="pauseMenuDesktop" class="pause-menu-overlay" aria-hidden="true">
    <div class="pause-menu-card">
      <div class="pause-menu-header">
        <h2 class="pause-menu-title">Menu de pausa</h2>
        <button id="pauseMenuDesktopClose" class="pause-menu-close" type="button">Fechar</button>
      </div>

      <div class="desktop-tip">
        Use o cursor central para mirar nos botões do painel. No desktop, as setas do teclado também funcionam.
      </div>

      <div class="pause-menu-grid">
        <div class="custom-panel" id="customModePanel">
          <h2>Modo alternativo</h2>

          <div class="row">
            <label for="customModeEnabled">Ativar modo customizado</label>
            <input id="customModeEnabled" type="checkbox" />
          </div>

          <div class="row">
            <label for="customLives">Vidas</label>
            <input id="customLives" type="number" min="1" step="1" value="3" />
          </div>

          <div class="row">
            <label for="customLivesInfinite">Vidas infinitas</label>
            <input id="customLivesInfinite" type="checkbox" />
          </div>

          <div class="row">
            <label for="customEnemyHits">Ataques para vencer</label>
            <input id="customEnemyHits" type="number" min="1" step="1" value="3" />
          </div>

          <div class="row">
            <label for="customEnemyHitsInfinite">Ataques infinitos</label>
            <input id="customEnemyHitsInfinite" type="checkbox" />
          </div>

          <div class="row">
            <label for="customDifficulty">Dificuldade (fase)</label>
            <select id="customDifficulty">
              <option value="1">Fase 1 (fácil)</option>
              <option value="2">Fase 2 (médio)</option>
              <option value="3">Fase 3 (difícil)</option>
            </select>
          </div>

          <div class="hint">As opções são aplicadas ao iniciar a partida.</div>
        </div>

        <div class="history-panel" id="performanceHistoryPanel">
          <h2>Histórico de desempenho</h2>
          <p class="history-empty" id="historyEmptyText">Sem dados ainda. Finalize uma fase para gerar histórico detalhado.</p>
          <ul class="history-list" id="performanceHistoryList"></ul>
        </div>
      </div>
    </div>
  </div>

  <a-scene
    renderer="antialias: true"
    xr-mode-ui="enabled: true"
    vr-mode-ui="enabled: true"
    background="color: #1a1a1a"
  >
    <a-assets>
      <audio
        id="battleSound"
        src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3">
      </audio>
      <a-asset-item id="hoodedAdventurerModel" src="models/hooded-adventurer.glb"></a-asset-item>
    </a-assets>

    <a-entity
      environment="
        preset: forest;
        dressingAmount: 120;
        ground: hills;
        lighting: dusk;">
    </a-entity>

    <a-entity id="rig" position="0 0 0">
      <a-entity
        id="playerCamera"
        camera
        position="0 1.6 0"
        look-controls
        wasd-controls="acceleration: 18"
        head-input
      >
        <a-cursor
          id="gazeCursor"
          color="white"
          fuse="true"
          fuse-timeout="1200"
          raycaster="objects: .clickable">
        </a-cursor>

        <a-entity id="cameraHudRoot" position="-0.52 0.24 -1.1" scale="0.28 0.28 0.28">
          <a-plane
            width="2.15"
            height="2.55"
            color="#111111"
            opacity="0.84"
            material="shader: flat; depthTest: false"
            radius="0.08">
          </a-plane>

          <a-plane
            id="hudTitle"
            position="0 0.98 0.02"
            width="1.8"
            height="0.18"
            material="transparent: true; opacity: 0; shader: flat; depthTest: false"
            canvas-text="value: Headbutt Berserker; align: left; fontSize: 70; color: #FFFFFF; padding: 28;">
          </a-plane>

          <a-plane
            id="hudPhase"
            position="0 0.72 0.02"
            width="1.8"
            height="0.15"
            material="transparent: true; opacity: 0; shader: flat; depthTest: false"
            canvas-text="value: Fase: 1; align: left; fontSize: 58; color: #FFFFFF; padding: 24;">
          </a-plane>

          <a-plane
            id="hudLives"
            position="0 0.50 0.02"
            width="1.8"
            height="0.15"
            material="transparent: true; opacity: 0; shader: flat; depthTest: false"
            canvas-text="value: Vidas: 3; align: left; fontSize: 58; color: #FFFFFF; padding: 24;">
          </a-plane>

          <a-plane
            id="hudEnemyHits"
            position="0 0.28 0.02"
            width="1.8"
            height="0.15"
            material="transparent: true; opacity: 0; shader: flat; depthTest: false"
            canvas-text="value: Ataques no inimigo: 0/3; align: left; fontSize: 54; color: #FFFFFF; padding: 24;">
          </a-plane>

          <a-plane
            id="hudHits"
            position="0 0.06 0.02"
            width="1.8"
            height="0.15"
            material="transparent: true; opacity: 0; shader: flat; depthTest: false"
            canvas-text="value: Acertos: 0; align: left; fontSize: 58; color: #FFFFFF; padding: 24;">
          </a-plane>

          <a-plane
            id="hudMisses"
            position="0 -0.16 0.02"
            width="1.8"
            height="0.15"
            material="transparent: true; opacity: 0; shader: flat; depthTest: false"
            canvas-text="value: Erros: 0; align: left; fontSize: 58; color: #FFFFFF; padding: 24;">
          </a-plane>

          <a-plane
            id="hudAvgReaction"
            position="0 -0.38 0.02"
            width="1.8"
            height="0.15"
            material="transparent: true; opacity: 0; shader: flat; depthTest: false"
            canvas-text="value: Tempo médio: --; align: left; fontSize: 52; color: #FFFFFF; padding: 24;">
          </a-plane>

          <a-plane
            id="hudPromptBg"
            position="0 -0.76 0.01"
            width="1.78"
            height="0.26"
            color="#252525"
            opacity="0.96"
            material="shader: flat; depthTest: false"
            radius="0.06">
          </a-plane>

          <a-plane
            id="hudPrompt"
            position="0 -0.76 0.02"
            width="1.68"
            height="0.18"
            material="transparent: true; opacity: 0; shader: flat; depthTest: false"
            canvas-text="value: APERTE INICIAR; align: center; fontSize: 72; color: #FFFFFF; padding: 10;">
          </a-plane>

          <a-plane
            id="hudResultBg"
            position="0 -1.08 0.01"
            width="1.78"
            height="0.34"
            color="#2B2B2B"
            opacity="0.95"
            material="shader: flat; depthTest: false"
            radius="0.06">
          </a-plane>

          <a-plane
            id="hudResult"
            position="0 -1.08 0.02"
            width="1.68"
            height="0.24"
            material="transparent: true; opacity: 0; shader: flat; depthTest: false"
            canvas-text="value: Aguardando...; align: center; fontSize: 50; color: #FFFFFF; padding: 18;">
          </a-plane>
        </a-entity>
      </a-entity>
    </a-entity>

    <a-entity id="menuOverlay" visible="false" position="0 0 -1.2"></a-entity>

    <a-entity id="menuMainScreen" visible="false" position="0 1.2 -3.0">
      <a-plane position="0 1.8 0.01" width="4.5" height="0.5" material="transparent: true; opacity: 0; shader: flat; depthTest: false; renderOrder: 10" canvas-text="value: MENU DE PAUSA; align: center; fontSize: 140; color: #FFFFFF; padding: 20;"></a-plane>

      <a-entity position="0 0.8 0.01">
        <a-plane class="clickable" gaze-button="action: openCustomizeMenu; dwellTime: 500" width="2.0" height="0.6" color="#2C5AA0" radius="0.1" material="shader: flat; depthTest: false; renderOrder: 10"></a-plane>
        <a-plane position="0 0 0.02" width="1.8" height="0.5" material="transparent: true; opacity: 0; shader: flat; depthTest: false; renderOrder: 10" canvas-text="value: PERSONALIZAR PARTIDA; align: center; fontSize: 90; color: #FFFFFF; padding: 15;"></a-plane>
      </a-entity>

      <a-entity position="0 0 0.01">
        <a-plane class="clickable" gaze-button="action: openHistoryMenu; dwellTime: 500" width="2.0" height="0.6" color="#4A7BA7" radius="0.1" material="shader: flat; depthTest: false; renderOrder: 10"></a-plane>
        <a-plane position="0 0 0.02" width="1.8" height="0.5" material="transparent: true; opacity: 0; shader: flat; depthTest: false; renderOrder: 10" canvas-text="value: HISTÓRICO; align: center; fontSize: 90; color: #FFFFFF; padding: 15;"></a-plane>
      </a-entity>

      <a-entity position="0 -0.8 0.01">
        <a-plane class="clickable" gaze-button="action: resumeGame; dwellTime: 500" width="2.0" height="0.6" color="#6B4423" radius="0.1" material="shader: flat; depthTest: false; renderOrder: 10"></a-plane>
        <a-plane position="0 0 0.02" width="1.8" height="0.5" material="transparent: true; opacity: 0; shader: flat; depthTest: false; renderOrder: 10" canvas-text="value: RETORNAR; align: center; fontSize: 90; color: #FFFFFF; padding: 15;"></a-plane>
      </a-entity>
    </a-entity>

    <a-entity id="menuCustomizeScreen" visible="false" position="0 1.2 -3.0">
      <a-plane position="0 1.8 0.01" width="4.5" height="0.5" material="transparent: true; opacity: 0; shader: flat; depthTest: false; renderOrder: 10" canvas-text="value: PERSONALIZAR PARTIDA; align: center; fontSize: 120; color: #FFFFFF; padding: 20;"></a-plane>

      <a-plane position="-1.8 1.2 0.01" width="1.2" height="0.35" material="transparent: true; opacity: 0; shader: flat; depthTest: false; renderOrder: 10" canvas-text="value: MODO CUSTOM:; align: center; fontSize: 80; color: #FFFFFF; padding: 10;"></a-plane>
      <a-entity position="0.2 1.2 0.01">
        <a-plane id="customModeCheckbox" class="clickable" gaze-button="action: toggle_custom_mode; dwellTime: 400" width="0.45" height="0.35" color="#555555" radius="0.05" material="shader: flat; depthTest: false; renderOrder: 10"></a-plane>
        <a-plane id="customModeCheckboxText" position="0 0 0.02" width="0.4" height="0.3" material="transparent: true; opacity: 0; shader: flat; depthTest: false; renderOrder: 10" canvas-text="value: ☐; align: center; fontSize: 100; color: #FFFFFF; padding: 5;"></a-plane>
      </a-entity>
      <a-plane id="customModeStatus" position="0.9 1.2 0.01" width="1.2" height="0.3" material="transparent: true; opacity: 0; shader: flat; depthTest: false; renderOrder: 10" canvas-text="value: DESATIVADO; align: center; fontSize: 70; color: #FF6B6B; padding: 10;"></a-plane>

      <a-plane position="-1.6 0.6 0.01" width="0.6" height="0.3" material="transparent: true; opacity: 0; shader: flat; depthTest: false; renderOrder: 10" canvas-text="value: VIDAS:; align: center; fontSize: 70; color: #FFFFFF; padding: 10;"></a-plane>
      <a-entity position="-0.7 0.6 0.01">
        <a-plane class="clickable" gaze-button="action: custom_lives_dec; dwellTime: 300" width="0.4" height="0.4" color="#FF6B6B" radius="0.06" material="shader: flat; depthTest: false; renderOrder: 10"></a-plane>
        <a-plane position="0 0 0.02" width="0.35" height="0.35" material="transparent: true; opacity: 0; shader: flat; depthTest: false; renderOrder: 10" canvas-text="value: -; align: center; fontSize: 80; color: #FFFFFF; padding: 5;"></a-plane>
      </a-entity>
      <a-plane id="customLivesDisplay" position="0.1 0.6 0.01" width="0.5" height="0.35" material="transparent: true; opacity: 0; shader: flat; depthTest: false; renderOrder: 10" canvas-text="value: 3; align: center; fontSize: 90; color: #FFFFFF; padding: 5;"></a-plane>
      <a-entity position="0.9 0.6 0.01">
        <a-plane class="clickable" gaze-button="action: custom_lives_inc; dwellTime: 300" width="0.4" height="0.4" color="#4ECDC4" radius="0.06" material="shader: flat; depthTest: false; renderOrder: 10"></a-plane>
        <a-plane position="0 0 0.02" width="0.35" height="0.35" material="transparent: true; opacity: 0; shader: flat; depthTest: false; renderOrder: 10" canvas-text="value: +; align: center; fontSize: 80; color: #FFFFFF; padding: 5;"></a-plane>
      </a-entity>

      <a-entity position="1.6 0.6 0.01">
        <a-plane id="customLivesInfiniteBtn" class="clickable" gaze-button="action: custom_toggle_lives_infinite; dwellTime: 400" width="0.5" height="0.35" color="#555" radius="0.06" material="shader: flat; depthTest: false; renderOrder: 10"></a-plane>
        <a-plane id="customLivesInfiniteText" position="0 0 0.02" width="0.45" height="0.3" material="transparent: true; opacity: 0; shader: flat; depthTest: false; renderOrder: 10" canvas-text="value: ∞; align: center; fontSize: 70; color: #FFFFFF; padding: 5;"></a-plane>
      </a-entity>

      <a-plane position="-1.6 0 0.01" width="0.7" height="0.3" material="transparent: true; opacity: 0; shader: flat; depthTest: false; renderOrder: 10" canvas-text="value: ATAQUES:; align: center; fontSize: 70; color: #FFFFFF; padding: 10;"></a-plane>
      <a-entity position="-0.7 0 0.01">
        <a-plane class="clickable" gaze-button="action: custom_enemy_dec; dwellTime: 300" width="0.4" height="0.4" color="#FF6B6B" radius="0.06" material="shader: flat; depthTest: false; renderOrder: 10"></a-plane>
        <a-plane position="0 0 0.02" width="0.35" height="0.35" material="transparent: true; opacity: 0; shader: flat; depthTest: false; renderOrder: 10" canvas-text="value: -; align: center; fontSize: 80; color: #FFFFFF; padding: 5;"></a-plane>
      </a-entity>
      <a-plane id="customEnemyDisplay" position="0.1 0 0.01" width="0.5" height="0.35" material="transparent: true; opacity: 0; shader: flat; depthTest: false; renderOrder: 10" canvas-text="value: 3; align: center; fontSize: 90; color: #FFFFFF; padding: 5;"></a-plane>
      <a-entity position="0.9 0 0.01">
        <a-plane class="clickable" gaze-button="action: custom_enemy_inc; dwellTime: 300" width="0.4" height="0.4" color="#4ECDC4" radius="0.06" material="shader: flat; depthTest: false; renderOrder: 10"></a-plane>
        <a-plane position="0 0 0.02" width="0.35" height="0.35" material="transparent: true; opacity: 0; shader: flat; depthTest: false; renderOrder: 10" canvas-text="value: +; align: center; fontSize: 80; color: #FFFFFF; padding: 5;"></a-plane>
      </a-entity>

      <a-entity position="1.6 0 0.01">
        <a-plane id="customEnemyInfiniteBtn" class="clickable" gaze-button="action: custom_toggle_enemy_infinite; dwellTime: 400" width="0.5" height="0.35" color="#555" radius="0.06" material="shader: flat; depthTest: false; renderOrder: 10"></a-plane>
        <a-plane id="customEnemyInfiniteText" position="0 0 0.02" width="0.45" height="0.3" material="transparent: true; opacity: 0; shader: flat; depthTest: false; renderOrder: 10" canvas-text="value: ∞; align: center; fontSize: 70; color: #FFFFFF; padding: 5;"></a-plane>
      </a-entity>

      <a-plane position="0 -0.5 0.01" width="2.2" height="0.3" material="transparent: true; opacity: 0; shader: flat; depthTest: false; renderOrder: 10" canvas-text="value: DIFICULDADE:; align: center; fontSize: 70; color: #FFFFFF; padding: 10;"></a-plane>
      
      <a-entity position="-1.0 -1.1 0.01">
        <a-plane id="difficultyBtn1" class="clickable" gaze-button="action: custom_set_difficulty_1; dwellTime: 300" width="0.55" height="0.45" color="#2C6CB0" radius="0.06" material="shader: flat; depthTest: false; renderOrder: 10"></a-plane>
        <a-plane position="0 0 0.02" width="0.5" height="0.4" material="transparent: true; opacity: 0; shader: flat; depthTest: false; renderOrder: 10" canvas-text="value: F1; align: center; fontSize: 80; color: #FFFFFF; padding: 5;"></a-plane>
      </a-entity>
      
      <a-entity position="0 -1.1 0.01">
        <a-plane id="difficultyBtn2" class="clickable" gaze-button="action: custom_set_difficulty_2; dwellTime: 300" width="0.55" height="0.45" color="#B8A200" radius="0.06" material="shader: flat; depthTest: false; renderOrder: 10"></a-plane>
        <a-plane position="0 0 0.02" width="0.5" height="0.4" material="transparent: true; opacity: 0; shader: flat; depthTest: false; renderOrder: 10" canvas-text="value: F2; align: center; fontSize: 80; color: #FFFFFF; padding: 5;"></a-plane>
      </a-entity>
      
      <a-entity position="1.0 -1.1 0.01">
        <a-plane id="difficultyBtn3" class="clickable" gaze-button="action: custom_set_difficulty_3; dwellTime: 300" width="0.55" height="0.45" color="#8B0000" radius="0.06" material="shader: flat; depthTest: false; renderOrder: 10"></a-plane>
        <a-plane position="0 0 0.02" width="0.5" height="0.4" material="transparent: true; opacity: 0; shader: flat; depthTest: false; renderOrder: 10" canvas-text="value: F3; align: center; fontSize: 80; color: #FFFFFF; padding: 5;"></a-plane>
      </a-entity>

      <a-entity position="0 -1.75 0.01">
        <a-plane class="clickable" gaze-button="action: backToMainMenu; dwellTime: 500" width="1.5" height="0.5" color="#6B4423" radius="0.08" material="shader: flat; depthTest: false; renderOrder: 10"></a-plane>
        <a-plane position="0 0 0.02" width="1.3" height="0.4" material="transparent: true; opacity: 0; shader: flat; depthTest: false; renderOrder: 10" canvas-text="value: VOLTAR; align: center; fontSize: 80; color: #FFFFFF; padding: 10;"></a-plane>
      </a-entity>
    </a-entity>

    <a-entity id="menuHistoryScreen" visible="false" position="0 1.2 -3.0">
      <a-plane position="0 1.8 0.01" width="4.5" height="0.5" material="transparent: true; opacity: 0; shader: flat; depthTest: false; renderOrder: 10" canvas-text="value: HISTÓRICO; align: center; fontSize: 140; color: #FFFFFF; padding: 20;"></a-plane>

      <a-entity position="-1.0 1.1 0.01">
        <a-plane id="tabHistoryBtn" class="clickable" gaze-button="action: selectHistoryTab; dwellTime: 400" width="0.9" height="0.35" color="#2C5AA0" radius="0.06" material="shader: flat; depthTest: false; renderOrder: 10"></a-plane>
        <a-plane position="0 0 0.02" width="0.8" height="0.3" material="transparent: true; opacity: 0; shader: flat; depthTest: false; renderOrder: 10" canvas-text="value: Histórico; align: center; fontSize: 65; color: #FFFFFF; padding: 8;"></a-plane>
      </a-entity>

      <a-entity position="1.0 1.1 0.01">
        <a-plane id="tabAIBtn" class="clickable" gaze-button="action: selectAITab; dwellTime: 400" width="0.9" height="0.35" color="#555555" radius="0.06" material="shader: flat; depthTest: false; renderOrder: 10"></a-plane>
        <a-plane position="0 0 0.02" width="0.8" height="0.3" material="transparent: true; opacity: 0; shader: flat; depthTest: false; renderOrder: 10" canvas-text="value: Assistente IA; align: center; fontSize: 55; color: #FFFFFF; padding: 8;"></a-plane>
      </a-entity>

      <a-plane id="historyTabContent" position="0 0.3 0.01" width="3.8" height="2.2" material="transparent: true; opacity: 0; shader: flat; depthTest: false; renderOrder: 10" canvas-text="value: Carregando histórico...; align: left; fontSize: 60; color: #FFFFFF; padding: 40; whiteSpace: pre-wrap;"></a-plane>

      <a-plane id="aiTabContent" position="0 0.3 0.01" width="3.8" height="2.2" material="transparent: true; opacity: 0; shader: flat; depthTest: false; renderOrder: 10" canvas-text="value: Assistente IA\n\nCarregue ou finalize partidas para ver recomendações.; align: left; fontSize: 54; color: #FFFFFF; padding: 40; whiteSpace: pre-wrap;" visible="false"></a-plane>

      <a-entity position="0 -1.75 0.01">
        <a-plane class="clickable" gaze-button="action: backToMainMenu; dwellTime: 500" width="1.5" height="0.5" color="#6B4423" radius="0.08" material="shader: flat; depthTest: false; renderOrder: 10"></a-plane>
        <a-plane position="0 0 0.02" width="1.3" height="0.4" material="transparent: true; opacity: 0; shader: flat; depthTest: false; renderOrder: 10" canvas-text="value: VOLTAR; align: center; fontSize: 80; color: #FFFFFF; padding: 10;"></a-plane>
      </a-entity>
    </a-entity>

    <a-entity id="pauseButtonVR" position="-1.5 2.0 -1.5" rotation="0 45 0">
      <a-circle radius="0.15" color="#222222" opacity="0.9"></a-circle>
      <a-plane class="clickable" gaze-button="action: openVRPauseMenu; dwellTime: 50" width="0.3" height="0.3" color="#222222" opacity="0"></a-plane>
      <a-plane position="0 0 0.01" width="0.25" height="0.25" material="transparent: true; opacity: 0" canvas-text="value: ⏸; align: center; fontSize: 120; color: #FFFFFF; padding: 5;"></a-plane>
    </a-entity>

    <a-entity id="worldHud" position="0 1.9 -0.7">
      <a-entity id="vrControlsRoot" position="1.1 -0.05 0" rotation="0 -22 0" scale="0.34 0.34 0.34">
        <a-plane
          width="2.7"
          height="3.2"
          color="#111111"
          opacity="0.84"
          radius="0.08">
        </a-plane>

        <a-plane
          position="0 1.22 0.02"
          width="2.1"
          height="0.18"
          material="transparent: true; opacity: 0"
          canvas-text="value: Headbutt Berserker; align: left; fontSize: 62; color: #FFFFFF; padding: 22;">
        </a-plane>

        <a-plane
          position="0 0.86 0.02"
          width="2.1"
          height="0.34"
          material="transparent: true; opacity: 0"
          canvas-text="value: Teclado: ↑ ataque, ← → esquiva, ↓ agachar; align: left; fontSize: 42; color: #FFFFFF; padding: 22;">
        </a-plane>

        <a-plane
          position="0 0.36 0.02"
          width="2.1"
          height="0.58"
          material="transparent: true; opacity: 0"
          canvas-text="value: Mire nos botões com o cursor central. Calibre a cabeça em posição neutra antes de jogar.; align: left; fontSize: 38; color: #D8D8D8; padding: 22;">
        </a-plane>

        <a-entity position="0 -0.40 0.02">
          <a-plane
            class="clickable"
            gaze-button="action: start; dwellTime: 1200"
            width="1.95"
            height="0.42"
            color="#2E8B57"
            radius="0.06">
          </a-plane>
          <a-plane
            position="0 0 0.01"
            width="1.7"
            height="0.18"
            material="transparent: true; opacity: 0"
            canvas-text="value: Iniciar Jogo; align: center; fontSize: 54; color: #FFFFFF; padding: 10;">
          </a-plane>
        </a-entity>

        <a-entity position="0 -1.00 0.02">
          <a-plane
            class="clickable"
            gaze-button="action: calibrate; dwellTime: 1200"
            width="1.95"
            height="0.42"
            color="#2C6CB0"
            radius="0.06">
          </a-plane>
          <a-plane
            position="0 0 0.01"
            width="1.7"
            height="0.18"
            material="transparent: true; opacity: 0"
            canvas-text="value: Calibrar Cabeça; align: center; fontSize: 50; color: #FFFFFF; padding: 10;">
          </a-plane>
        </a-entity>

        <a-entity id="stopButtonGroup" position="0 -1.60 0.02">
          <a-plane
            class="clickable"
            gaze-button="action: reset; dwellTime: 1200"
            width="1.95"
            height="0.42"
            color="#8B2E2E"
            radius="0.06">
          </a-plane>
          <a-plane
            position="0 0 0.01"
            width="1.7"
            height="0.18"
            material="transparent: true; opacity: 0"
            canvas-text="value: Parar; align: center; fontSize: 54; color: #FFFFFF; padding: 10;">
          </a-plane>
        </a-entity>


      </a-entity>
    </a-entity>

    <a-entity id="enemy" position="0 0 -8" enemy-ai sound="src: #battleSound">
      <a-entity
        id="enemyModel"
        gltf-model="#hoodedAdventurerModel"
        position="0 0 0"
        rotation="0 180 0"
        scale="1.15 1.15 1.15"
        animation-mixer="clip: CharacterArmature|Idle; loop: repeat; crossFadeDuration: 0.2">
      </a-entity>

      <!-- Hitboxes/âncoras invisíveis mantêm a lógica original do jogo. -->
      <a-cylinder position="0 1 0" height="2" radius="0.5" color="#c68642" visible="false"></a-cylinder>
      <a-sphere id="enemyHead" position="0 2.3 0" radius="0.5" color="#f1c27d" visible="false"></a-sphere>
      <a-sphere position="0 2.5 0" radius="0.55" color="gray" visible="false"></a-sphere>

      <a-cone position="-0.4 3.0 0" rotation="0 0 60" radius-bottom="0.1" height="0.8" color="white" visible="false"></a-cone>
      <a-cone position="0.4 3.0 0" rotation="0 0 -60" radius-bottom="0.1" height="0.8" color="white" visible="false"></a-cone>

      <a-entity id="leftArm" position="-0.8 1.4 0" rotation="0 0 30">
        <a-cylinder radius="0.15" height="1.2" color="#c68642" visible="false"></a-cylinder>
        <a-cylinder position="-0.25 -0.6 0" radius="0.05" height="1.2" rotation="0 0 -30" color="#8B4513" visible="false"></a-cylinder>
        <a-box position="-0.1 -1.2 0" depth="0.15" height="0.6" width="0.5" rotation="0 0 -30" color="silver" visible="false"></a-box>
      </a-entity>

      <a-entity id="rightArm" position="0.8 1.4 0" rotation="0 0 -30">
        <a-cylinder radius="0.15" height="1.2" color="#c68642" visible="false"></a-cylinder>
        <a-cylinder position="0.25 -0.6 0" radius="0.05" height="1.2" rotation="0 0 30" color="#8B4513" visible="false"></a-cylinder>
        <a-box position="0.1 -1.2 0" depth="0.15" height="0.6" width="0.5" rotation="0 0 30" color="silver" visible="false"></a-box>
      </a-entity>
    </a-entity>

    <a-entity arena-circle></a-entity>
    <a-plane rotation="-90 0 0" width="200" height="200" visible="false"></a-plane>

    <a-entity light="type: ambient; intensity: 0.7"></a-entity>
    <a-entity light="type: directional; intensity: 0.8" position="1 3 2"></a-entity>
  </a-scene>

  <script src="scripts/state.js"></script>
  <script src="scripts/ui.js"></script>
  <script src="scripts/gameplay.js"></script>
  <script src="scripts/components.js"></script>
</body>
</html>
